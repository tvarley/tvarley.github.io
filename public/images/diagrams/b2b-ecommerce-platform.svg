  <rect x="70" y="374" width="210" height="98" rx="8" fill="#112240" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="70" y="374" width="210" height="24" rx="8" fill="#3fb950" opacity="0.15"/>
  <text x="175" y="391" text-anchor="middle" font-size="10" fill="#3fb950" letter-spacing="1" font-weight="bold">S3 STORAGE</text>
  <text x="175" y="412" text-anchor="middle" font-size="12" fill="#ccd6f6" font-weight="bold">Asset Buckets</text>
  <text x="175" y="430" text-anchor="middle" font-size="9" fill="#8892b0">Images · Docs · Exports</text>
  <text x="175" y="447" text-anchor="middle" font-size="9" fill="#8892b0">Versioned · Encrypted</text>
  <text x="175" y="463" text-anchor="middle" font-size="9" fill="#3fb950">Object storage origin</text>
  <!-- CloudFront -->
  <rect x="345" y="374" width="210" height="98" rx="8" fill="#112240" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="345" y="374" width="210" height="24" rx="8" fill="#3fb950" opacity="0.15"/>
  <text x="450" y="391" text-anchor="middle" font-size="10" fill="#3fb950" letter-spacing="1" font-weight="bold">CLOUDFRONT CDN</text>
  <text x="450" y="412" text-anchor="middle" font-size="12" fill="#ccd6f6" font-weight="bold">Global Edge</text>
  <text x="450" y="430" text-anchor="middle" font-size="9" fill="#8892b0">270+ PoPs worldwide</text>
  <text x="450" y="447" text-anchor="middle" font-size="9" fill="#8892b0">Cache · Compress · Serve</text>
  <text x="450" y="463" text-anchor="middle" font-size="9" fill="#3fb950">Buyer-facing CDN layer</text>
  <!-- Workers -->
  <rect x="620" y="374" width="210" height="98" rx="8" fill="#112240" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="620" y="374" width="210" height="24" rx="8" fill="#3fb950" opacity="0.15"/>
  <text x="725" y="391" text-anchor="middle" font-size="10" fill="#3fb950" letter-spacing="1" font-weight="bold">COMPUTE WORKERS</text>
  <text x="725" y="412" text-anchor="middle" font-size="12" fill="#ccd6f6" font-weight="bold">Image Processing</text>
  <text x="725" y="430" text-anchor="middle" font-size="9" fill="#8892b0">Resize · Optimize · Tag</text>
  <text x="725" y="447" text-anchor="middle" font-size="9" fill="#8892b0">Async queue workers</text>
  <text x="725" y="463" text-anchor="middle" font-size="9" fill="#3fb950">Offloaded from app tier</text>
  <!-- S3->CDN -->
  <line x1="280" y1="423" x2="345" y2="423" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="285" y="412" width="55" height="16" rx="3" fill="#0d1e0f"/>
  <text x="312" y="424" text-anchor="middle" font-size="9" fill="#3fb950">origin</text>
  <!-- S3->Workers -->
  <line x1="280" y1="448" x2="620" y2="448" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <rect x="412" y="437" width="76" height="16" rx="3" fill="#0d1e0f"/>
  <text x="450" y="449" text-anchor="middle" font-size="9" fill="#3fb950">queue job</text>
  <!-- Cross-zone flows -->
  <line x1="135" y1="140" x2="180" y2="192" stroke="#64ffda" stroke-width="1.5" marker-end="url(#arrow-teal)" filter="url(#glow-teal)"/>
  <rect x="95" y="154" width="58" height="16" rx="3" fill="#0d1117"/>
  <text x="124" y="166" text-anchor="middle" font-size="9" fill="#64ffda">browse</text>
  <line x1="700" y1="140" x2="305" y2="192" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow-grey)"/>
  <rect x="500" y="148" width="60" height="16" rx="3" fill="#0d1117"/>
  <text x="530" y="160" text-anchor="middle" font-size="9" fill="#8892b0">update</text>
  <line x1="200" y1="292" x2="175" y2="374" stroke="#64ffda" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-teal)"/>
  <rect x="152" y="325" width="65" height="16" rx="3" fill="#0d1117"/>
  <text x="184" y="337" text-anchor="middle" font-size="9" fill="#64ffda">upload</text>
  <path d="M 420 374 C 380 310, 200 280, 135 140" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <rect x="255" y="302" width="90" height="16" rx="3" fill="#0d1117"/>
  <text x="300" y="314" text-anchor="middle" font-size="9" fill="#3fb950">serve assets</text>
