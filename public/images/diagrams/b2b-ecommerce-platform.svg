<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Courier New', Courier, monospace">
  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#1e3a5f" opacity="0.5"/></pattern>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64ffda"/></marker>
    <marker id="arrow-grey" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#8892b0"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
    <marker id="arrow-teal-rev" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,3 L8,0 L8,6 z" fill="#64ffda"/></marker>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="520" fill="#0d1117"/>
  <rect width="900" height="520" fill="url(#dots)"/>
  <text x="450" y="36" text-anchor="middle" font-size="13" font-weight="bold" fill="#64ffda" letter-spacing="3">B2B E-COMMERCE · HYBRID CLOUD ARCHITECTURE</text>
  <line x1="180" y1="46" x2="720" y2="46" stroke="#64ffda" stroke-width="0.5" opacity="0.4"/>
  <!-- BUYERS -->
  <rect x="55" y="68" width="160" height="72" rx="8" fill="#0a1628" stroke="#64ffda" stroke-width="1.5" filter="url(#glow-teal)"/>
  <rect x="55" y="68" width="160" height="22" rx="8" fill="#64ffda" opacity="0.12"/>
  <text x="135" y="84" text-anchor="middle" font-size="9" fill="#64ffda" letter-spacing="2" font-weight="bold">BUYERS</text>
  <circle cx="110" cy="107" r="7" fill="none" stroke="#64ffda" stroke-width="1.5"/><path d="M98,122 Q110,114 122,122" fill="none" stroke="#64ffda" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="155" cy="107" r="7" fill="none" stroke="#64ffda" stroke-width="1.5"/><path d="M143,122 Q155,114 167,122" fill="none" stroke="#64ffda" stroke-width="1.5" stroke-linecap="round"/>
  <!-- SUPPLIERS -->
  <rect x="685" y="68" width="160" height="72" rx="8" fill="#0a1628" stroke="#8892b0" stroke-width="1.5"/>
  <rect x="685" y="68" width="160" height="22" rx="8" fill="#8892b0" opacity="0.12"/>
  <text x="765" y="84" text-anchor="middle" font-size="9" fill="#8892b0" letter-spacing="2" font-weight="bold">SUPPLIERS</text>
  <circle cx="730" cy="107" r="7" fill="none" stroke="#8892b0" stroke-width="1.5"/><path d="M718,122 Q730,114 742,122" fill="none" stroke="#8892b0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="800" cy="107" r="7" fill="none" stroke="#8892b0" stroke-width="1.5"/><path d="M788,122 Q800,114 812,122" fill="none" stroke="#8892b0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- HEROKU ZONE -->
  <rect x="35" y="170" width="830" height="155" rx="12" fill="#0f2035" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="52" y="162" width="185" height="22" rx="4" fill="#0d1117"/>
  <text x="145" y="177" text-anchor="middle" font-size="10" fill="#79c0ff" font-weight="bold" letter-spacing="2">⬡ HEROKU PAAS</text>
  <!-- Storefront -->
  <rect x="90" y="192" width="235" height="100" rx="8" fill="#112240" stroke="#79c0ff" stroke-width="2" filter="url(#glow-blue)"/>
  <rect x="90" y="192" width="235" height="26" rx="8" fill="#79c0ff" opacity="0.15"/>
  <text x="207" y="210" text-anchor="middle" font-size="10" fill="#79c0ff" letter-spacing="1" font-weight="bold">STOREFRONT APP</text>
  <text x="207" y="232" text-anchor="middle" font-size="12" fill="#ccd6f6" font-weight="bold">Node.js</text>
  <text x="207" y="250" text-anchor="middle" font-size="9" fill="#8892b0">Express · Sessions · Cart</text>
  <text x="207" y="267" text-anchor="middle" font-size="9" fill="#8892b0">Auto-scaling Dynos</text>
  <text x="207" y="282" text-anchor="middle" font-size="9" fill="#64ffda">20% infra cost reduction</text>
