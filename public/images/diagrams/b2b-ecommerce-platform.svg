  <line x1="325" y1="243" x2="535" y2="243" stroke="#64ffda" stroke-width="1.5" marker-start="url(#arrow-teal-rev)" marker-end="url(#arrow-teal)"/>
  <rect x="383" y="233" width="110" height="18" rx="3" fill="#0d1117"/>
  <text x="438" y="246" text-anchor="middle" font-size="9" fill="#64ffda">HTTP · REST</text>
  <!-- Search -->
  <rect x="535" y="192" width="235" height="100" rx="8" fill="#112240" stroke="#79c0ff" stroke-width="2"/>
  <rect x="535" y="192" width="235" height="26" rx="8" fill="#79c0ff" opacity="0.15"/>
  <text x="652" y="210" text-anchor="middle" font-size="10" fill="#79c0ff" letter-spacing="1" font-weight="bold">SEARCH SERVICE</text>
  <text x="652" y="232" text-anchor="middle" font-size="12" fill="#ccd6f6" font-weight="bold">Elasticsearch</text>
  <text x="652" y="250" text-anchor="middle" font-size="9" fill="#8892b0">Full-text · Facets · Filters</text>
  <text x="652" y="267" text-anchor="middle" font-size="9" fill="#8892b0">Product catalog index</text>
  <text x="652" y="282" text-anchor="middle" font-size="9" fill="#64ffda">Sub-100ms queries</text>
  <!-- AWS ZONE -->
  <rect x="35" y="355" width="830" height="140" rx="12" fill="#0d1e0f" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="52" y="347" width="165" height="22" rx="4" fill="#0d1117"/>
  <text x="135" y="362" text-anchor="middle" font-size="10" fill="#3fb950" font-weight="bold" letter-spacing="2">&#x2601; AWS CLOUD</text>
