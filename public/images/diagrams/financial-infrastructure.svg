<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="'Courier New', Courier, monospace">
  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#1e3a5f" opacity="0.4"/></pattern>
    <marker id="arr-fast" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,8 L10,4 z" fill="#00ff88"/></marker>
    <marker id="arr-slow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#8892b0"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/></marker>
    <filter id="glow-fast" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-node" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-lock" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="960" height="500" fill="#0d1117"/>
  <rect width="960" height="500" fill="url(#dots)"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="13" font-weight="bold" fill="#64ffda" letter-spacing="3">HIGH-FREQUENCY FINANCIAL INFRASTRUCTURE · EMBARGO RELEASE</text>
  <line x1="140" y1="44" x2="820" y2="44" stroke="#64ffda" stroke-width="0.5" opacity="0.4"/>

  <!-- ═══ FAST PATH ZONE ═══ -->
  <rect x="28" y="58" width="900" height="210" rx="12" fill="#001a0a" stroke="#00ff88" stroke-width="2" filter="url(#glow-node)"/>
  <rect x="45" y="50" width="210" height="22" rx="4" fill="#0d1117"/>
  <text x="150" y="65" text-anchor="middle" font-size="10" fill="#00ff88" font-weight="bold" letter-spacing="2">CRITICAL PATH · FAST LANE</text>
  <rect x="750" y="50" width="175" height="22" rx="4" fill="#001a0a" stroke="#00ff88" stroke-width="1.5" filter="url(#glow-fast)"/>
  <text x="837" y="65" text-anchor="middle" font-size="10" fill="#00ff88" font-weight="bold" letter-spacing="1">EMBARGO → TRADE: &lt;15ms</text>

  <!-- PRESS ROOM -->
  <rect x="45" y="75" width="175" height="170" rx="8" fill="#0a0a1a" stroke="#c792ea" stroke-width="2"/>
  <rect x="45" y="75" width="175" height="26" rx="8" fill="#c792ea" opacity="0.2"/>
  <text x="132" y="93" text-anchor="middle" font-size="9" fill="#c792ea" letter-spacing="1" font-weight="bold">EMBARGOED PRESS ROOM</text>
  <!-- building/lock icon -->
  <rect x="100" y="112" rx="2" width="64" height="50" fill="none" stroke="#c792ea" stroke-width="1.5"/>
  <rect x="107" y="120" rx="1" width="12" height="14" fill="#c792ea" opacity="0.3"/>
  <rect x="124" y="120" rx="1" width="12" height="14" fill="#c792ea" opacity="0.3"/>
  <rect x="141" y="120" rx="1" width="12" height="14" fill="#c792ea" opacity="0.3"/>
  <rect x="107" y="140" rx="1" width="12" height="20" fill="#c792ea" opacity="0.5"/>
  <line x1="100" y1="107" x2="164" y2="107" stroke="#c792ea" stroke-width="1.2" opacity="0.5"/>
  <text x="132" y="180" text-anchor="middle" font-size="9" fill="#ccd6f6">DoL · Treasury</text>
  <text x="132" y="196" text-anchor="middle" font-size="9" fill="#8892b0">Journalists locked in</text>
  <text x="132" y="212" text-anchor="middle" font-size="8" fill="#8892b0">No internet access</text>
  <text x="132" y="228" text-anchor="middle" font-size="8" fill="#c792ea">NFP · CPI · GDP · PPI</text>

  <!-- THE LOCKBOX (center hero element) -->
  <rect x="248" y="85" width="145" height="155" rx="10" fill="#0a1500" stroke="#00ff88" stroke-width="3" filter="url(#glow-lock)"/>
  <rect x="248" y="85" width="145" height="28" rx="10" fill="#00ff88" opacity="0.2"/>
  <text x="320" y="104" text-anchor="middle" font-size="9" fill="#00ff88" letter-spacing="1" font-weight="bold">PHYSICAL LOCK BOX</text>
  <!-- padlock icon -->
  <rect x="302" y="130" rx="4" width="36" height="30" fill="none" stroke="#00ff88" stroke-width="2"/>
  <path d="M309,130 L309,122 Q309,114 320,114 Q331,114 331,122 L331,130" fill="none" stroke="#00ff88" stroke-width="2"/>
  <circle cx="320" cy="147" r="4" fill="#00ff88" opacity="0.6"/>
  <line x1="320" y1="151" x2="320" y2="156" stroke="#00ff88" stroke-width="1.5"/>
  <text x="320" y="183" text-anchor="middle" font-size="9" fill="#ccd6f6">Hardware timer</text>
  <text x="320" y="199" text-anchor="middle" font-size="9" fill="#8892b0">Opens at embargo</text>
  <text x="320" y="215" text-anchor="middle" font-size="8" fill="#00ff88">8:30 AM ET exactly</text>
  <text x="320" y="231" text-anchor="middle" font-size="8" fill="#8892b0">Triggers data burst</text>

  <!-- Arrow: Press Room -> Lock Box -->
  <line x1="220" y1="160" x2="248" y2="160" stroke="#c792ea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="220" y="147" width="28" height="14" rx="2" fill="#0d1117"/>
  <text x="234" y="158" text-anchor="middle" font-size="7" fill="#c792ea">feed</text>

  <!-- Arrow: Lock Box -> C++ Core (FAST, glowing) -->
  <line x1="393" y1="160" x2="453" y2="160" stroke="#00ff88" stroke-width="3" marker-end="url(#arr-fast)" filter="url(#glow-fast)"/>
  <rect x="393" y="144" width="60" height="16" rx="3" fill="#0d1117"/>
  <text x="423" y="156" text-anchor="middle" font-size="8" fill="#00ff88">data burst</text>

  <!-- C++ FEED HANDLER -->
  <rect x="453" y="78" width="185" height="162" rx="8" fill="#001810" stroke="#00ff88" stroke-width="2.5" filter="url(#glow-fast)"/>
  <rect x="453" y="78" width="185" height="26" rx="8" fill="#00ff88" opacity="0.2"/>
  <text x="545" y="97" text-anchor="middle" font-size="9" fill="#00ff88" letter-spacing="1" font-weight="bold">C++ FEED HANDLER</text>
  <text x="545" y="115" text-anchor="middle" font-size="9" fill="#ccd6f6">CPU-Pinned · Kernel Bypass</text>
  <!-- CPU icon -->
  <rect x="523" y="124" rx="3" width="44" height="44" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <rect x="530" y="131" rx="1" width="30" height="30" fill="#00ff88" opacity="0.12"/>
  <line x1="526" y1="136" x2="519" y2="136" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="526" y1="144" x2="519" y2="144" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="526" y1="152" x2="519" y2="152" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="567" y1="136" x2="574" y2="136" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="567" y1="144" x2="574" y2="144" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="567" y1="152" x2="574" y2="152" stroke="#00ff88" stroke-width="1.2"/>
  <text x="545" y="186" text-anchor="middle" font-size="9" fill="#8892b0">Parse raw release</text>
  <text x="545" y="202" text-anchor="middle" font-size="9" fill="#8892b0">Normalize fields</text>
  <text x="545" y="218" text-anchor="middle" font-size="9" fill="#8892b0">DPDK · No syscalls</text>
  <text x="545" y="232" text-anchor="middle" font-size="8" fill="#00ff88">Zero alloc hot path</text>

  <!-- Arrow: C++ -> Network -->
  <line x1="638" y1="160" x2="698" y2="160" stroke="#00ff88" stroke-width="3" marker-end="url(#arr-fast)" filter="url(#glow-fast)"/>
  <rect x="638" y="144" width="60" height="16" rx="3" fill="#0d1117"/>
  <text x="668" y="156" text-anchor="middle" font-size="8" fill="#00ff88">UDP multicast</text>

  <!-- WALL STREET CLIENTS -->
  <rect x="698" y="78" width="215" height="162" rx="8" fill="#001810" stroke="#00ff88" stroke-width="2.5" filter="url(#glow-fast)"/>
  <rect x="698" y="78" width="215" height="26" rx="8" fill="#00ff88" opacity="0.2"/>
  <text x="805" y="97" text-anchor="middle" font-size="9" fill="#00ff88" letter-spacing="1" font-weight="bold">TRADING CLIENTS</text>
  <text x="805" y="115" text-anchor="middle" font-size="9" fill="#ccd6f6">Wall Street · Global Banks</text>
  <!-- Building skyline icon -->
  <rect x="720" y="136" width="14" height="28" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.6"/>
  <rect x="738" y="126" width="18" height="38" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.8"/>
  <rect x="760" y="132" width="14" height="32" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.6"/>
  <rect x="778" y="120" width="20" height="44" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <rect x="802" y="130" width="14" height="34" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.6"/>
  <rect x="820" y="125" width="16" height="39" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.8"/>
  <rect x="840" y="135" width="12" height="29" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.6"/>
  <line x1="718" y1="164" x2="862" y2="164" stroke="#00ff88" stroke-width="0.8" opacity="0.3"/>
  <text x="805" y="184" text-anchor="middle" font-size="9" fill="#8892b0">Algo strategies</text>
  <text x="805" y="200" text-anchor="middle" font-size="9" fill="#8892b0">Futures · FX · Equities</text>
  <text x="805" y="218" text-anchor="middle" font-size="9" fill="#8892b0">Pre-positioned orders</text>
  <text x="805" y="234" text-anchor="middle" font-size="8" fill="#00ff88">Execute in milliseconds</text>

  <!-- DMA label spanning across fast path -->
  <rect x="398" y="65" width="295" height="17" rx="3" fill="#001810" stroke="#00ff88" stroke-width="0.8" opacity="0.8"/>
  <text x="545" y="77" text-anchor="middle" font-size="8" fill="#00ff88" letter-spacing="3">K E R N E L   B Y P A S S   ·   D E D I C A T E D   L E A S E D   L I N E S</text>

  <!-- ═══ SLOW PATH ═══ -->
  <rect x="28" y="292" width="900" height="180" rx="12" fill="#0d1117" stroke="#4a4a6a" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>
  <rect x="45" y="284" width="210" height="22" rx="4" fill="#0d1117"/>
  <text x="150" y="299" text-anchor="middle" font-size="10" fill="#6a6a8a" font-weight="bold" letter-spacing="2">PUBLIC RELEASE · SLOW PATH</text>
  <text x="820" y="299" text-anchor="middle" font-size="9" fill="#4a4a6a" letter-spacing="1">SECONDS-MINUTES LATER</text>

  <!-- Fork down from lock box -->
  <line x1="320" y1="240" x2="320" y2="310" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-slow)"/>
  <rect x="327" y="268" width="100" height="16" rx="3" fill="#0d1117"/>
  <text x="377" y="280" text-anchor="middle" font-size="8" fill="#8892b0">public release</text>

  <!-- BLS/Treasury Website -->
  <rect x="60" y="314" width="170" height="125" rx="8" fill="#141420" stroke="#4a4a6a" stroke-width="1.5" opacity="0.8"/>
  <rect x="60" y="314" width="170" height="24" rx="8" fill="#4a4a6a" opacity="0.2"/>
  <text x="145" y="331" text-anchor="middle" font-size="9" fill="#6a6a8a" font-weight="bold" letter-spacing="1">BLS / TREASURY</text>
  <text x="145" y="351" text-anchor="middle" font-size="9" fill="#505068">bls.gov · treasury.gov</text>
  <text x="145" y="369" text-anchor="middle" font-size="9" fill="#505068">Public website POST</text>
  <text x="145" y="387" text-anchor="middle" font-size="9" fill="#505068">RSS · press release</text>
  <text x="145" y="405" text-anchor="middle" font-size="8" fill="#ff9b9b">seconds to minutes late</text>
  <text x="145" y="422" text-anchor="middle" font-size="8" fill="#4a4a6a">too slow to trade on</text>

  <!-- Financial Media -->
  <rect x="260" y="314" width="170" height="125" rx="8" fill="#141420" stroke="#4a4a6a" stroke-width="1.5" opacity="0.8"/>
  <rect x="260" y="314" width="170" height="24" rx="8" fill="#4a4a6a" opacity="0.2"/>
  <text x="345" y="331" text-anchor="middle" font-size="9" fill="#6a6a8a" font-weight="bold" letter-spacing="1">FINANCIAL MEDIA</text>
  <text x="345" y="351" text-anchor="middle" font-size="9" fill="#505068">Bloomberg · Reuters</text>
  <text x="345" y="369" text-anchor="middle" font-size="9" fill="#505068">CNBC · WSJ wire</text>
  <text x="345" y="387" text-anchor="middle" font-size="9" fill="#505068">Headline broadcast</text>
  <text x="345" y="405" text-anchor="middle" font-size="8" fill="#ff9b9b">10–30 seconds late</text>
  <text x="345" y="422" text-anchor="middle" font-size="8" fill="#4a4a6a">market already moved</text>

  <!-- HA / Redundancy -->
  <rect x="460" y="314" width="190" height="125" rx="8" fill="#141420" stroke="#4a4a6a" stroke-width="1.5" opacity="0.8"/>
  <rect x="460" y="314" width="190" height="24" rx="8" fill="#4a4a6a" opacity="0.2"/>
  <text x="555" y="331" text-anchor="middle" font-size="9" fill="#6a6a8a" font-weight="bold" letter-spacing="1">HA REDUNDANCY</text>
  <text x="555" y="351" text-anchor="middle" font-size="9" fill="#505068">Dual lock boxes</text>
  <text x="555" y="369" text-anchor="middle" font-size="9" fill="#505068">Failover pairs</text>
  <text x="555" y="387" text-anchor="middle" font-size="9" fill="#505068">Sub-ms anomaly detect</text>
  <text x="555" y="405" text-anchor="middle" font-size="8" fill="#f0c27f">custom monitoring</text>
  <text x="555" y="422" text-anchor="middle" font-size="8" fill="#4a4a6a">bespoke latency probes</text>

  <!-- Audit / Compliance -->
  <rect x="678" y="314" width="225" height="125" rx="8" fill="#141420" stroke="#4a4a6a" stroke-width="1.5" opacity="0.8"/>
  <rect x="678" y="314" width="225" height="24" rx="8" fill="#4a4a6a" opacity="0.2"/>
  <text x="790" y="331" text-anchor="middle" font-size="9" fill="#6a6a8a" font-weight="bold" letter-spacing="1">COMPLIANCE LOG</text>
  <text x="790" y="351" text-anchor="middle" font-size="9" fill="#505068">Microsecond timestamps</text>
  <text x="790" y="369" text-anchor="middle" font-size="9" fill="#505068">SEC · FINRA audit trail</text>
  <text x="790" y="387" text-anchor="middle" font-size="9" fill="#505068">Embargo compliance record</text>
  <text x="790" y="405" text-anchor="middle" font-size="8" fill="#f0c27f">async · never on hot path</text>
  <text x="790" y="422" text-anchor="middle" font-size="8" fill="#4a4a6a">write-ahead log</text>
</svg>
