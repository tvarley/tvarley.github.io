<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" width="940" height="500" font-family="'Courier New', Courier, monospace">
  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#1e3a5f" opacity="0.4"/></pattern>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/></marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64ffda"/></marker>
    <marker id="arr-grey" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#8892b0"/></marker>
    <filter id="glow-red" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-teal" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="940" height="500" fill="#0d1117"/>
  <rect width="940" height="500" fill="url(#dots)"/>
  <text x="470" y="34" text-anchor="middle" font-size="13" font-weight="bold" fill="#64ffda" letter-spacing="3">ENTERPRISE SAAS MIGRATION · BEFORE vs AFTER</text>
  <line x1="170" y1="44" x2="770" y2="44" stroke="#64ffda" stroke-width="0.5" opacity="0.4"/>
  <!-- LEFT: Legacy -->
  <rect x="28" y="55" width="400" height="415" rx="12" fill="#1a0808" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <rect x="45" y="47" width="120" height="22" rx="4" fill="#0d1117"/>
  <text x="105" y="62" text-anchor="middle" font-size="10" fill="#ff6b6b" font-weight="bold" letter-spacing="2">LEGACY STATE</text>
  <!-- User legacy -->
  <circle cx="228" cy="85" r="9" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <path d="M215,100 Q228,92 241,100" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="228" y="116" text-anchor="middle" font-size="9" fill="#ff6b6b">User</text>
  <line x1="228" y1="122" x2="228" y2="155" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- Monolith -->
  <rect x="68" y="155" width="320" height="270" rx="6" fill="#1f0808" stroke="#ff6b6b" stroke-width="2.5" filter="url(#glow-red)"/>
  <rect x="68" y="155" width="320" height="32" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="228" y="177" text-anchor="middle" font-size="12" fill="#ff6b6b" letter-spacing="2" font-weight="bold">THE MONOLITH</text>
  <line x1="88" y1="210" x2="368" y2="210" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  <line x1="88" y1="253" x2="368" y2="253" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  <line x1="88" y1="296" x2="368" y2="296" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  <line x1="88" y1="339" x2="368" y2="339" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  <line x1="88" y1="382" x2="368" y2="382" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  <text x="228" y="197" text-anchor="middle" font-size="10" fill="#ff9b9b" font-weight="bold">Presentation Layer</text>
  <text x="228" y="240" text-anchor="middle" font-size="10" fill="#ff9b9b" font-weight="bold">Business Logic</text>
  <text x="228" y="275" text-anchor="middle" font-size="8" fill="#8892b0">auth · orders · billing · users · products · reports</text>
  <text x="228" y="285" text-anchor="middle" font-size="8" fill="#8892b0">notifications · sessions · search · inventory · audit</text>
  <text x="228" y="325" text-anchor="middle" font-size="10" fill="#ff9b9b" font-weight="bold">Data Access Layer</text>
  <text x="228" y="368" text-anchor="middle" font-size="10" fill="#ff9b9b" font-weight="bold">Database (single)</text>
  <text x="228" y="400" text-anchor="middle" font-size="8" fill="#8892b0">shared tables · fat schemas · migration fear</text>
  <text x="228" y="415" text-anchor="middle" font-size="8" fill="#ff6b6b">Tight coupling · Deploy everything or nothing</text>
  <!-- Cracks -->
  <path d="M200,187 L215,220 L205,240 L225,280 L210,320" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
  <path d="M260,187 L248,230 L265,255 L250,310 L270,360" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
  <!-- Center divider -->
  <line x1="470" y1="60" x2="470" y2="458" stroke="#8892b0" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.4"/>
  <path d="M440,250 L500,250" fill="none" stroke="#64ffda" stroke-width="2" marker-end="url(#arr-teal)"/>
  <rect x="436" y="235" width="88" height="20" rx="4" fill="#0d1117"/>
  <text x="480" y="249" text-anchor="middle" font-size="8" fill="#64ffda" font-weight="bold" letter-spacing="1">REFACTOR</text>
  <path d="M440,270 L500,270" fill="none" stroke="#64ffda" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="480" y="295" text-anchor="middle" font-size="8" fill="#8892b0">years of work</text>
  <!-- RIGHT: Modern -->
  <rect x="512" y="55" width="400" height="415" rx="12" fill="#071a0f" stroke="#64ffda" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <rect x="529" y="47" width="140" height="22" rx="4" fill="#0d1117"/>
  <text x="599" y="62" text-anchor="middle" font-size="10" fill="#64ffda" font-weight="bold" letter-spacing="2">MODERN STATE</text>
  <!-- User modern -->
  <circle cx="712" cy="85" r="9" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <path d="M699,100 Q712,92 725,100" fill="none" stroke="#64ffda" stroke-width="1.5" stroke-linecap="round"/>
  <text x="712" y="116" text-anchor="middle" font-size="9" fill="#64ffda">User</text>
  <line x1="712" y1="122" x2="712" y2="155" stroke="#64ffda" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- Load Balancer -->
  <rect x="602" y="155" width="220" height="52" rx="8" fill="#112240" stroke="#64ffda" stroke-width="2" filter="url(#glow-teal)"/>
  <rect x="602" y="155" width="220" height="22" rx="8" fill="#64ffda" opacity="0.15"/>
  <text x="712" y="171" text-anchor="middle" font-size="10" fill="#64ffda" letter-spacing="1" font-weight="bold">LOAD BALANCER</text>
  <text x="712" y="195" text-anchor="middle" font-size="9" fill="#8892b0">Round-robin · Health checks · SSL termination</text>
  <line x1="712" y1="207" x2="712" y2="240" stroke="#64ffda" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- API Gateway -->
  <rect x="582" y="240" width="260" height="52" rx="8" fill="#112240" stroke="#79c0ff" stroke-width="2"/>
  <rect x="582" y="240" width="260" height="22" rx="8" fill="#79c0ff" opacity="0.15"/>
  <text x="712" y="256" text-anchor="middle" font-size="10" fill="#79c0ff" letter-spacing="1" font-weight="bold">API GATEWAY</text>
  <text x="712" y="280" text-anchor="middle" font-size="9" fill="#8892b0">Auth · Rate limit · Route · Observe</text>
  <!-- Fan out -->
  <line x1="712" y1="292" x2="712" y2="320" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="712" y1="320" x2="582" y2="320" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="712" y1="320" x2="842" y2="320" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="582" y1="320" x2="582" y2="338" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arr-grey)"/>
  <line x1="712" y1="320" x2="712" y2="338" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arr-grey)"/>
  <line x1="842" y1="320" x2="842" y2="338" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arr-grey)"/>
  <!-- Auth Service -->
  <rect x="527" y="338" width="110" height="95" rx="8" fill="#112240" stroke="#c792ea" stroke-width="1.5"/>
  <rect x="527" y="338" width="110" height="22" rx="8" fill="#c792ea" opacity="0.2"/>
  <text x="582" y="354" text-anchor="middle" font-size="9" fill="#c792ea" font-weight="bold" letter-spacing="1">AUTH</text>
  <text x="582" y="374" text-anchor="middle" font-size="9" fill="#ccd6f6">JWT · OAuth</text>
  <text x="582" y="390" text-anchor="middle" font-size="9" fill="#8892b0">Sessions</text>
  <text x="582" y="406" text-anchor="middle" font-size="9" fill="#8892b0">Permissions</text>
  <text x="582" y="422" text-anchor="middle" font-size="8" fill="#64ffda">own DB</text>
  <!-- Order Service -->
  <rect x="657" y="338" width="110" height="95" rx="8" fill="#112240" stroke="#f0c27f" stroke-width="1.5"/>
  <rect x="657" y="338" width="110" height="22" rx="8" fill="#f0c27f" opacity="0.2"/>
  <text x="712" y="354" text-anchor="middle" font-size="9" fill="#f0c27f" font-weight="bold" letter-spacing="1">ORDER</text>
  <text x="712" y="374" text-anchor="middle" font-size="9" fill="#ccd6f6">Cart · Checkout</text>
  <text x="712" y="390" text-anchor="middle" font-size="9" fill="#8892b0">Fulfillment</text>
  <text x="712" y="406" text-anchor="middle" font-size="9" fill="#8892b0">Payments</text>
  <text x="712" y="422" text-anchor="middle" font-size="8" fill="#64ffda">own DB</text>
  <!-- User Service -->
  <rect x="787" y="338" width="110" height="95" rx="8" fill="#112240" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="787" y="338" width="110" height="22" rx="8" fill="#3fb950" opacity="0.2"/>
  <text x="842" y="354" text-anchor="middle" font-size="9" fill="#3fb950" font-weight="bold" letter-spacing="1">USER</text>
  <text x="842" y="374" text-anchor="middle" font-size="9" fill="#ccd6f6">Profiles · Prefs</text>
  <text x="842" y="390" text-anchor="middle" font-size="9" fill="#8892b0">Notifications</text>
  <text x="842" y="406" text-anchor="middle" font-size="9" fill="#8892b0">Activity log</text>
  <text x="842" y="422" text-anchor="middle" font-size="8" fill="#64ffda">own DB</text>
  <!-- Footer -->
  <rect x="536" y="446" width="352" height="18" rx="4" fill="#071a0f" stroke="#64ffda" stroke-width="0.8"/>
  <text x="712" y="459" text-anchor="middle" font-size="9" fill="#64ffda">Each service deploys independently · Scales independently · Fails independently</text>
</svg>
